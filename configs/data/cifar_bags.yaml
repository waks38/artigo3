# Image MIL with VISIBLE instances and known witnesses (built from CIFAR-10)
name: cifar_bags
loader: cifar_bags
root: data/raw
target_class: 0      # 0=airplane ... see CIFAR10_CLASSES
bag_size: 15         # fixed bag size (no sweeps)
num_witnesses: 1     # exactly one witness in a positive bag
positive_ratio: 0.5  # balanced
num_bags: 250
num_classes: 1
in_dim: null         # raw RGB images; encoder is a CNN (in_channels=3, image_size=32)
