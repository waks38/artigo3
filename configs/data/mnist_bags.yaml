# Synthetic image-bag benchmark (Ilse et al., 2018)
name: mnist_bags
loader: mnist_bags
root: data/raw
target_digit: 9
bag_size: 15          # fixed bag size (no sweeps)
num_witnesses: 1      # exactly one witness in a positive bag
positive_ratio: 0.5   # balanced
num_bags: 250
num_classes: 1
in_dim: null     # raw images; encoder is a small CNN
